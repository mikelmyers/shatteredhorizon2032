; ============================================================================
; ENHANCED INPUT — Input Action Definitions
; The actual InputAction and InputMappingContext assets are created in-editor.
; Below are the legacy fallback action/axis mappings for reference and
; compatibility. The primary input path uses Enhanced Input assets:
;
;   /Game/Core/Input/IMC_OnFoot          — Main on-foot mapping context
;   /Game/Core/Input/IMC_Vehicle         — Vehicle control context
;   /Game/Core/Input/IMC_Drone           — Drone control context
;   /Game/Core/Input/IMC_SquadCommand    — Squad command overlay context
;
; Enhanced Input Actions (defined as assets in /Game/Core/Input/Actions/):
;   IA_Move, IA_Look, IA_Jump, IA_Sprint, IA_Crouch, IA_Prone,
;   IA_Fire, IA_Aim, IA_Reload, IA_SwitchWeapon, IA_MeleeAttack,
;   IA_Interact, IA_LeanLeft, IA_LeanRight,
;   IA_SquadCommand, IA_SquadCommandConfirm, IA_SquadCommandCancel,
;   IA_DroneToggle, IA_DroneAscend, IA_DroneDescend,
;   IA_Comms, IA_RadioPTT, IA_Scoreboard, IA_Pause,
;   IA_ThrowGrenade, IA_SwitchFireMode, IA_NightVision, IA_Compass
; ============================================================================

